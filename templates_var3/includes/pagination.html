{% if page_obj.has_other_pages %}
<div class="pagination">
    {% if page_obj.has_previous %}
    <a class="pagination-link" href="{% querystring page=page_obj.previous_page_number %}">← Назад</a>
    {% endif %}
    <span class="pagination-current">Страница {{ page_obj.number }} из {{ page_obj.paginator.num_pages }}</span>
    {% if page_obj.has_next %}
    <a class="pagination-link" href="{% querystring page=page_obj.next_page_number %}">Вперёд →</a>
    {% endif %}
</div>
{% endif %}
